<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440" />
  <title>Goleme — Template Showcase &amp; Component Libraries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
    rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #FFFFFF;
      --ink: #1D1C1B;
      --yellow: #F5C518;
      --yellow-light: #FDF4CD;
      --ink-60: rgba(29, 28, 27, 0.60);
      --ink-30: rgba(29, 28, 27, 0.30);
      --ink-10: rgba(29, 28, 27, 0.10);
      --ink-06: rgba(29, 28, 27, 0.06);
    }

    html,
    body {
      width: 1440px;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ MAIN LAYOUT CONTEXT ══════════════════════════ */
    .container {
      width: 1440px;
      padding: 100px 80px 120px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
    }



    /* ══ SHOWCASE GRID SECTION (BOTTOM) ══════════════ */
    .showcase__frame {
      width: 1280px;
      background: #111110;
      border-radius: 24px;
      padding: 16px;
      position: relative;
    }

    /* Mosaic grid */
    .mosaic {
      width: 100%;
      display: grid;
      grid-template-columns: 215px 1fr 1fr 215px;
      grid-template-rows: 190px 180px 148px;
      gap: 6px;
      position: relative;
    }

    /* Generic tile */
    .tile {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
    }

    /* Browser chrome bar */
    .chrome {
      flex-shrink: 0;
      height: 22px;
      display: flex;
      align-items: center;
      padding: 0 9px;
      gap: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    /* Tile body */
    .body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
    }

    /* Stacked content inside body */


    .lbl {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      text-align: center;
    }

    .hdl {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Color themes ── */
    .dark {
      background: #1a1918;
    }

    .dark .chrome {
      background: rgba(255, 255, 255, 0.05);
    }

    .dark .dot {
      background: rgba(255, 255, 255, 0.22);
    }

    .dark .lbl {
      color: rgba(255, 255, 255, 0.25);
    }

    .dark .hdl {
      color: #fff;
    }

    .light {
      background: #F5F3EF;
    }

    .light .chrome {
      background: rgba(0, 0, 0, 0.055);
    }

    .light .dot {
      background: rgba(0, 0, 0, 0.18);
    }

    .light .lbl {
      color: rgba(29, 28, 27, 0.26);
    }

    .light .hdl {
      color: var(--ink);
    }

    .mid {
      background: #E4E0D8;
    }

    .mid .chrome {
      background: rgba(0, 0, 0, 0.07);
    }

    .mid .dot {
      background: rgba(0, 0, 0, 0.18);
    }

    .mid .lbl {
      color: rgba(29, 28, 27, 0.26);
    }

    .mid .hdl {
      color: var(--ink);
    }

    .yell {
      background: #F5C518;
    }

    .yell .chrome {
      background: rgba(0, 0, 0, 0.07);
    }

    .yell .dot {
      background: rgba(0, 0, 0, 0.20);
    }

    .yell .lbl {
      color: rgba(29, 28, 27, 0.30);
    }

    .yell .hdl {
      color: var(--ink);
    }

    .lavender {
      background: #D8D3F2;
    }

    .lavender .chrome {
      background: rgba(0, 0, 0, 0.055);
    }

    .lavender .dot {
      background: rgba(0, 0, 0, 0.15);
    }

    .lavender .lbl {
      color: rgba(42, 26, 122, 0.30);
    }

    .lavender .hdl {
      color: #2a1a7a;
    }

    .sky {
      background: #C8E8F5;
    }

    .sky .chrome {
      background: rgba(0, 0, 0, 0.055);
    }

    .sky .dot {
      background: rgba(0, 0, 0, 0.15);
    }

    .sky .lbl {
      color: rgba(10, 58, 92, 0.30);
    }

    .sky .hdl {
      color: #0a3a5c;
    }

    /* Grid positions */
    .r1c1 {
      grid-column: 1;
      grid-row: 1;
    }

    .r1c2 {
      grid-column: 2;
      grid-row: 1;
    }

    .r1c3 {
      grid-column: 3;
      grid-row: 1;
    }

    .r1c4 {
      grid-column: 4;
      grid-row: 1;
    }

    .r2c1 {
      grid-column: 1;
      grid-row: 2;
    }

    .r2c2 {
      grid-column: 2;
      grid-row: 2;
    }

    .r2c3 {
      grid-column: 3;
      grid-row: 2;
    }

    .r2c4 {
      grid-column: 4;
      grid-row: 2;
    }

    .r3c1 {
      grid-column: 1;
      grid-row: 3;
    }

    .r3c2 {
      grid-column: 2;
      grid-row: 3;
    }

    .r3c3 {
      grid-column: 3;
      grid-row: 3;
    }

    .r3c4 {
      grid-column: 4;
      grid-row: 3;
    }

    /* Floating pill badge */
    .pill {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      /* sits at the seam of row1/row2: row1=190px + 6px gap = 196px, pill h=48px → top=172px */
      top: 172px;
      z-index: 10;
      height: 48px;
      padding: 0 20px;
      background: #fff;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.09);
      box-shadow: 0 4px 28px rgba(0, 0, 0, 0.20);
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      cursor: pointer;
    }

    .pill__count {
      font-size: 17px;
      font-weight: 700;
      color: var(--yellow);
      font-family: 'Inter', sans-serif;
    }

    .pill__text {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
    }

    .pill__arrow {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    /* Utility shape helpers */
    .bar {
      border-radius: 3px;
    }

    .rect {
      border-radius: 5px;
    }

    .round {
      border-radius: 999px;
    }
  </style>
</head>

<body>

  <main class="container">





    <!-- ══ SHOWCASE GRID SECTION (BOTTOM) ══════════════ -->
    <section class="showcase__frame">
      <div class="mosaic">

        <!-- ROW 1 -->
        <!-- R1C1 · Sky blue · plane/aviation style -->
        <div class="tile sky r1c1">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body">
            <div class="stack">
              <div class="lbl">Aviation Style</div>
              <div style="font-size: 24px;">✈</div>
              <div style="width:70px;height:5px;background:rgba(10,58,92,0.12);" class="bar"></div>
            </div>
          </div>
        </div>

        <!-- R1C2 · Dark · TRONA styled mockup -->
        <div class="tile dark r1c2">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body">
            <div class="stack">
              <div class="hdl" style="font-size:32px;letter-spacing:-1.5px;">TRONA</div>
              <div style="width:110px;height:5px;background:rgba(255,255,255,0.06);" class="bar"></div>
              <div style="width:70px;height:5px;background:rgba(255,255,255,0.04);" class="bar"></div>
            </div>
          </div>
        </div>

        <!-- R1C3 · Dark · Dumbbell/Gym mockup -->
        <div class="tile dark r1c3">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body">
            <div class="stack">
              <div class="hdl" style="font-size:14px;color:rgba(255,255,255,0.8);">(Dumbbell AI) Gym</div>
              <div style="display:flex;align-items:center;gap:4px;margin-top:4px;">
                <div style="width:8px;height:24px;background:rgba(255,255,255,0.2);" class="bar"></div>
                <div style="width:24px;height:6px;background:rgba(255,255,255,0.4);" class="bar"></div>
                <div style="width:8px;height:24px;background:rgba(255,255,255,0.2);" class="bar"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- R1C4 · Light · Plan. Manage. Build. -->
        <div class="tile light r1c4">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body">
            <div class="stack">
              <div class="hdl" style="font-size:13px;text-align:left;max-width:130px;color:var(--ink);">Plan. Manage.
                Build.</div>
              <div style="width:100px;height:44px;background:rgba(29,28,27,0.06);border-radius:4px;"></div>
            </div>
          </div>
        </div>

        <!-- ROW 2 -->
        <!-- R2C1 · Light · Phone / card loyalty mock -->
        <div class="tile light r2c1">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body">
            <div class="stack">
              <div
                style="width:48px;height:72px;background:rgba(29,28,27,0.06);border:1px solid rgba(29,28,27,0.12);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;">
                <div style="width:36px;height:22px;background:var(--ink);border-radius:2px;"></div>
                <div style="width:28px;height:3px;background:rgba(29,28,27,0.2);margin-top:6px;" class="bar"></div>
              </div>
              <div class="lbl" style="font-size:8px;">Loyalty Card</div>
            </div>
          </div>
        </div>

        <!-- R2C2 · Lavender · RE tile -->
        <div class="tile lavender r2c2">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body">
            <div class="stack">
              <div class="hdl" style="font-size:38px;letter-spacing:-2px;color:#2a1a7a;">RE</div>
              <div class="lbl" style="font-size:8px;color:rgba(42,26,122,0.40);">Creative Hub</div>
            </div>
          </div>
        </div>

        <!-- R2C3 · Light · Prisjakt style yellow highlight -->
        <div class="tile light r2c3">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body">
            <div class="stack">
              <div class="hdl" style="font-size:12px;color:var(--ink);">Buy in groups.<br /><span
                  style="background:var(--yellow);padding:0 4px;border-radius:2px;">Than Prisjakt.</span></div>
              <div style="width:80px;height:5px;background:rgba(29,28,27,0.08);" class="bar"></div>
            </div>
          </div>
        </div>

        <!-- R2C4 · Light · Blue sky / crane mockup -->
        <div class="tile light r2c4">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body"
            style="background:#E2F3F9;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;">
            <div class="hdl" style="font-size:11px;color:#0a3a5c;">Elevate perspective</div>
            <div
              style="width:80px;height:32px;background:rgba(10,58,92,0.08);border-radius:4px;position:relative;overflow:hidden;">
              <div
                style="width:90px;height:2px;background:var(--yellow);transform:rotate(15deg);position:absolute;top:15px;left:-5px;">
              </div>
            </div>
          </div>
        </div>

        <!-- ROW 3 -->
        <!-- R3C1 · Light · Construction crane base -->
        <div class="tile light r3c1">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body" style="background:#EBF5FA;display:flex;align-items:flex-end;justify-content:center;">
            <div
              style="width:40px;height:80px;border-left:2px solid var(--yellow);border-right:2px solid var(--yellow);position:relative;">
              <div style="width:100%;height:2px;background:var(--yellow);position:absolute;top:20px;"></div>
              <div style="width:100%;height:2px;background:var(--yellow);position:absolute;top:40px;"></div>
              <div style="width:100%;height:2px;background:var(--yellow);position:absolute;top:60px;"></div>
            </div>
          </div>
        </div>

        <!-- R3C2 · Light · Find people and funding -->
        <div class="tile light r3c2">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body">
            <div class="stack" style="align-items:flex-start;">
              <div class="hdl" style="font-size:11px;text-align:left;color:var(--ink);">FIND PEOPLE AND FUNDING</div>
              <div style="display:flex;align-items:center;gap:6px;width:100%;">
                <div style="flex:1;height:18px;background:rgba(29,28,27,0.07);border-radius:3px;"></div>
                <div style="width:24px;height:24px;background:rgba(29,28,27,0.1);border-radius:50%;"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- R3C3 · Dark · webflow development ghost -->
        <div class="tile dark r3c3">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body">
            <div class="stack">
              <div class="lbl" style="font-size:8px;color:rgba(255,255,255,0.4);">YOUR GO-TO</div>
              <div class="hdl" style="font-size:12px;color:#fff;">webflow development ghost</div>
              <div style="width:46px;height:16px;background:#00d285;border-radius:8px;"></div>
            </div>
          </div>
        </div>

        <!-- R3C4 · Mid · Saunas for life -->
        <div class="tile mid r3c4">
          <div class="chrome">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="body">
            <div class="stack">
              <div class="hdl" style="font-size:13px;font-style:italic;color:var(--ink);">Elegant. Superior.<br />Saunas
                for life.</div>
              <div style="width:60px;height:5px;background:rgba(29,28,27,0.10);" class="bar"></div>
            </div>
          </div>
        </div>

        <!-- FLOATING PILL -->
        <div class="pill">
          <span class="pill__count">500k+</span>
          <span class="pill__text">Websites built with Goleme</span>
          <div class="pill__arrow">&#8594;</div>
        </div>

      </div>
    </section>

  </main>

</body>

</html>
